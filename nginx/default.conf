server {
    listen 80;
    server_name techlio.in www.techlio.in;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name techlio.in www.techlio.in;

    # SSL Certificate Paths (Managed by Certbot on Host)
    ssl_certificate /etc/letsencrypt/live/techlio.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techlio.in/privkey.pem;

    # SSL Optimization
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Serve React Frontend
    location / {
        try_files $uri /index.html;
    }

    # Proxy API calls to the Backend container
    location /api/ {
        # The trailing '/' after 5000/ is essential to strip '/api' from the URL
        proxy_pass http://backend:5000/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real IP headers for backend logging & security
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback for 404 errors
    error_page 404 /index.html;
}